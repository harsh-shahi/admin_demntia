<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #2f3640;
      color: white;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    .controls {
      text-align: center;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      background: #0984e3;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    #loading {
      text-align: center;
      font-size: 18px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<div id="loading">Loading users...</div>

<table id="userTable" style="display:none;">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>DOB</th>
      <th>Hash ID</th>
      <th>Sessions</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div class="controls">
  <button id="prevBtn" onclick="prevPage()">Prev</button>
  <button id="nextBtn" onclick="nextPage()">Next</button>
</div>

<script>
  const BASE_URL = "http://localhost:5000/api";

  let users = [];
  let currentPage = 0;
  const limit = 5;

  async function fetchUsers() {
    try {
      const res = await fetch(`${BASE_URL}/admin/users`);
      const data = await res.json();

      users = data.users || [];

      document.getElementById("loading").style.display = "none";
      document.getElementById("userTable").style.display = "table";

      renderTable();
    } catch (err) {
      document.getElementById("loading").innerText = "Error loading users ❌";
      console.error(err);
    }
  }

  function renderTable() {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    const start = currentPage * limit;
    const end = start + limit;

    const pageUsers = users.slice(start, end);

    pageUsers.forEach(user => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${user.user.name}</td>
        <td>${user.user.email}</td>
        <td>${user.user.dob}</td>
        <td style="font-size:12px;">${user.hashId}</td>
        <td>${user.sessions.length}</td>
      `;

      tableBody.appendChild(row);
    });

    updateButtons();
  }

  function nextPage() {
    if ((currentPage + 1) * limit < users.length) {
      currentPage++;
      renderTable();
    }
  }

  function prevPage() {
    if (currentPage > 0) {
      currentPage--;
      renderTable();
    }
  }

  function updateButtons() {
    document.getElementById("prevBtn").disabled = currentPage === 0;
    document.getElementById("nextBtn").disabled =
      (currentPage + 1) * limit >= users.length;
  }

  fetchUsers();
</script>

</body>
</html>
